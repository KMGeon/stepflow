# Path-based auto-labels for pull requests (actions/labeler v5).
'area: core':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/*'
          - 'src/builder/**'
          - 'src/engine/**'
          - 'src/metadata/**'
          - 'src/repository/**'
'area: infrastructure':
  - changed-files:
      - any-glob-to-any-file: 'src/infrastructure/**'
'area: integration':
  - changed-files:
      - any-glob-to-any-file: 'src/integration/**'
'area: puppeteer':
  - changed-files:
      - any-glob-to-any-file: 'src/puppeteer/**'
'area: test':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/test/**'
          - 'test/**'
'area: docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - '**/*.md'
'area: ci':
  - changed-files:
      - any-glob-to-any-file: '.github/**'
'dependencies':
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - 'package-lock.json'
