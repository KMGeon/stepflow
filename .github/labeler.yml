# Path-based auto-labels for pull requests (actions/labeler v5).
'area: core':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-core/**'
'area: infrastructure':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-infrastructure/**'
'area: integration':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-integration/**'
'area: puppeteer':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-puppeteer/**'
'area: bundle':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-bundle/**'
'area: test':
  - changed-files:
      - any-glob-to-any-file: 'stepflow-test/**'
'area: docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'stepflow-docs/**'
          - 'README.md'
          - '**/*.md'
'area: ci':
  - changed-files:
      - any-glob-to-any-file: '.github/**'
'dependencies':
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - 'package-lock.json'
