name: Feature request
description: Suggest an idea or enhancement for stepflow
labels: ['type: enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that stepflow does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketch welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
