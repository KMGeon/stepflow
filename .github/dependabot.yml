version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    # Major bumps are breaking — handle them deliberately, not via auto-PRs.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      tooling:
        patterns:
          - '@eslint/*'
          - 'eslint*'
          - 'prettier'
          - 'typescript'
          - 'typescript-eslint'
          - 'tsup'
          - 'vitest'
          - '@vitest/*'
          - '@changesets/*'
      runtime-peers:
        patterns:
          - 'puppeteer'
          - 'mysql2'
          - 'better-sqlite3'
          - '@types/better-sqlite3'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'area: ci'
