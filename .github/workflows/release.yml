name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: changesets version / publish
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      # Publish with npm provenance: signs the build and links each package on npm
      # back to this repo, commit, and workflow run (needs id-token: write above).
      NPM_CONFIG_PROVENANCE: 'true'
      # Only run the release step once the NPM_TOKEN secret has been added.
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      # When changesets exist, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped), runs `npm run release` to publish.
      - name: Create Release PR or publish
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
